
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Online Job Application Form</h1>

    <form  method="POST">

        <fieldset>
        <legend>Personal Informations</legend>
            
        <p>
        <label for="fullName">Full name:</label>
            <input type="text" id="fullName" name="fullName" required>
            </p>
            
            <p>
            <label for="nid">National id number:</label>
            <input type="text" id="nid" name="nid" required>
            </p>
            
            <p>
            <label for="email">Email address:</label>
            <input type="email" id="email" name="email" required>
            </p>
            
            <p>
            <label for="phone">Phone number:</label>
            <input type="tel" id="phone" name="phone" required>
            </p>
            
            <p>
            <label for="db">Date of birth:</label>
            <input type="date" id="db" name="db" required>
            </p>
            <p>
                <label>Gender:</label>
                <input type="radio" id="male" name="gender" value="Male" required>
                <label  for="male">Male</label>
                
                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>
                
                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label>
            </p>
        </fieldset>

        <fieldset>
            <legend>Job Information & Skills</legend>
            
            <p>
                <label for="position">Position applied for:</label>
                <select id="position" name="position" required>
                    <option value="Software Developer" selected>Software Developer</option>
                    <option value="Web Designer">Web Designer</option>
                    <option value="Network Engineer">Network Engineer</option>
                    <option value="Database Administrator">Database Administrator</option>
                    <option value="IT Support Officer">IT Support Officer</option>
                </select>
            </p>
            <p>
                <label for="experience">Experience Level:</label>
                <select id="experience" name="experience" required>
                    <option value="Fresher">Fresher</option>
                    <option value="1-2 Years">1-2 Years</option>
                    <option value="3-5 Years">3-5 Years</option>
                    <option value="More Than 5 Years">More Than 5 Years</option>
                </select>
            </p>
            <p>
                <label>Select Technical Skills:</label><br>
                <input type="checkbox" id="html" name="skills" value="HTML">
                <label for="html">HTML</label>
                <input type="checkbox" id="css" name="skills" value="CSS">
                <label for="css">CSS</label>
                <input type="checkbox" id="js" name="skills" value="JavaScript">
                <label for="js">JavaScript</label>
                <input type="checkbox" id="python" name="skills" value="Python">
                <label for="python">Python</label>
                <input type="checkbox" id="sql" name="skills" value="SQL">
                <label for="sql">SQL</label>
            </p>
        </fieldset>
         <fieldset>
            <legend>Educational Information</legend>
            
            <p>
                <label for="qualification">Highest Qualification:</label>
                <input type="text" id="qualification" name="qualification" placeholder="what is your degree" required>
            </p>
            
            <p>
                <label for="university">University/College Name:</label>
                <input type="text" id="university" name="university" placeholder="where you graduated" required>
            </p>
            
            <p>
                <label for="graduationyear">Graduation Year:</label>
                <input type="number" id="graduatinyear" name="graduationyear" placeholder="when you graduated" required>
            </p>
        </fieldset>
        <fieldset>
            <legend>Additional Information</legend>
            
            <p>
                <label for="resume">Upload Resume/CV:</label>
                <input type="file" id="resume" name="resume" required>
            </p>
            
            <p>
                <label for="coverLetter">Cover Letter:</label><br>
                <textarea id="coverLetter" name="coverLetter" rows="5" cols="50" maxlength="300" placeholder="(Max 300 characters)" required></textarea>
            </p>
            
            <p>
                <label for="address">Current Address:</label><br>
                <textarea id="address" name="address" rows="5" cols="50" placeholder="Enter your current addres" required></textarea>
            </p>
        </fieldset>
         <button type="submit">Submit Application</button>
        <button type="reset">Reset Form</button>
</body>
</html>
